# .github/workflows/manus-audit.yml
# 統合監査ワークフロー: 日次/週次/月次を一元化

name: Manus Audit (Unified)

on:
  schedule:
    # 毎日 06:00 JST (21:00 UTC 前日)
    - cron: '0 21 * * *'
    # 毎週月曜日 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
    # 毎月1日 03:00 JST (18:00 UTC 前日)
    - cron: '0 18 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '監査モード'
        required: false
        default: 'daily'
        type: choice
        options:
          - 'daily'
          - 'weekly'
          - 'monthly'
      test_mode:
        description: 'テストモード（擬似エラーで自動修繕をテスト）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.schedule == '0 18 1 * *' && 15 || (github.event.schedule == '0 0 * * 1' && 5 || 10) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Determine audit mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            MODE="monthly"
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            MODE="weekly"
          else
            MODE="daily"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "📅 監査モード: $MODE"

      - name: Run audit
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MANUS_AUDIT_API_KEY: ${{ secrets.MANUS_AUDIT_API_KEY }}
        run: |
          echo "🔐 Checking required secrets..."

          MISSING=()
          if [ -z "$SUPABASE_URL" ]; then
            MISSING+=("SUPABASE_URL")
          fi

          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$MANUS_AUDIT_API_KEY" ]; then
            MISSING+=("SUPABASE_SERVICE_ROLE_KEY or MANUS_AUDIT_API_KEY")
          fi

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            echo "   → GitHub Secrets に必要な値を設定してください"
            echo "AUDIT_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            AUTH_TOKEN="$SUPABASE_SERVICE_ROLE_KEY"
            AUTH_SOURCE="SUPABASE_SERVICE_ROLE_KEY"
          else
            AUTH_TOKEN="$MANUS_AUDIT_API_KEY"
            AUTH_SOURCE="MANUS_AUDIT_API_KEY"
          fi

          echo "✅ Auth token source: $AUTH_SOURCE"
          echo "ℹ️ X-API-Key header: $(if [ -n "$MANUS_AUDIT_API_KEY" ]; then echo enabled; else echo disabled; fi)"

          HEADER_ARGS=(
            -H "Content-Type: application/json"
            -H "Authorization: Bearer ${AUTH_TOKEN}"
          )

          if [ -n "$MANUS_AUDIT_API_KEY" ]; then
            HEADER_ARGS+=( -H "X-API-Key: ${MANUS_AUDIT_API_KEY}" )
          fi

          MODE="${{ steps.mode.outputs.mode }}"
          echo "🔍 ${MODE} 監査を実行中..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/manus-audit-line-daily-brief?mode=${MODE}" \
            "${HEADER_ARGS[@]}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          AUDIT_FAILED=false
          mkdir -p tmp
          AUDIT_BODY_PATH="tmp/audit_body.json"
          printf '%s' "$BODY" > "$AUDIT_BODY_PATH"

          echo "AUDIT_MODE=$MODE" >> $GITHUB_ENV
          echo "AUDIT_HTTP_CODE=$HTTP_CODE" >> $GITHUB_ENV
          echo "AUDIT_BODY_PATH=$AUDIT_BODY_PATH" >> $GITHUB_ENV

          # BODYをGITHUB_ENVに保存（後続ステップで使用）
          echo "AUDIT_BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            if [ "$HTTP_CODE" -eq 401 ] || [ "$HTTP_CODE" -eq 403 ]; then
              echo "❌ 認証に失敗しました。GitHub SecretsのSUPABASE_SERVICE_ROLE_KEY/MANUS_AUDIT_API_KEYを確認してください。"
            fi
            echo "❌ 監査が失敗しました (HTTP $HTTP_CODE)"
            AUDIT_FAILED=true
          else
            # Check if there are warnings or errors
            ALL_PASSED=$(echo "$BODY" | jq -r '.summary.allPassed // false')
            WARNING_COUNT=$(echo "$BODY" | jq -r '.summary.warningCount // 0')
            ERROR_COUNT=$(echo "$BODY" | jq -r '.summary.errorCount // 0')

            # Extract themes with low inventory for auto-replenish
            # 修正: cardInventory.details から ready_cards == 0 のテーマを抽出
            LOW_THEMES=$(echo "$BODY" | jq -r '.checks.cardInventory.details[]? | select(.ready_cards == 0) | .theme' | tr '\n' ',' | sed 's/,$//')

            if [ -n "$LOW_THEMES" ]; then
              echo "LOW_INVENTORY_THEMES=${LOW_THEMES}" >> $GITHUB_ENV
              echo "🔔 カード在庫不足テーマ: ${LOW_THEMES}"
            fi

            if [ "$ALL_PASSED" = "true" ]; then
              echo "✅ 監査完了: 全て正常"
            else
              echo "⚠️ 監査完了: ${WARNING_COUNT}件の警告、${ERROR_COUNT}件のエラー"
              if [ "$ERROR_COUNT" -gt 0 ]; then
                AUDIT_FAILED=true
              fi
            fi
          fi

          echo "AUDIT_FAILED=$AUDIT_FAILED" >> $GITHUB_ENV

      # カード在庫不足時の自動補充（daily のみ）
      - name: Auto-replenish cards if low
        if: env.LOW_INVENTORY_THEMES != '' && steps.mode.outputs.mode == 'daily'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🤖 カード在庫不足を検出 - AI自動補充を開始..."
          echo "対象テーマ: $LOW_INVENTORY_THEMES"

          gh workflow run replenish-cards.yml \
            -f themes="${LOW_INVENTORY_THEMES}" \
            -f count="20"

          echo "✅ AI自動補充ワークフローをトリガーしました"

      # LINE問題検出時の自動修繕（daily のみ、GitHub Actions → Manus フォールバック）
      - name: Detect LINE issues and trigger auto-repair
        id: line_repair
        if: always() && steps.mode.outputs.mode == 'daily'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 LINE問題の検出を開始..."

          # 監査結果からLINE問題を抽出（AUDIT_BODYはGITHUB_ENV経由で受け取り）
          # remediation.error に含まれる外部 401 とは分離し、LINE 登録システムの監査結果だけを見る
          LINE_ISSUES=""

          if [ -z "$AUDIT_BODY" ]; then
            echo "⚠️ 監査結果が空です（前ステップでエラーの可能性）"
            exit 0
          fi

          LINE_CHECK=$(echo "$AUDIT_BODY" | jq -c '.checks.lineRegistrationSystem // null')
          if [ -z "$LINE_CHECK" ] || [ "$LINE_CHECK" = "null" ]; then
            echo "ℹ️ LINE登録システム監査データなし"
            exit 0
          fi

          LINE_PASSED=$(echo "$LINE_CHECK" | jq -r '.passed // true')
          LINE_SIGNALS=$(echo "$LINE_CHECK" | jq -r '
            [
              (.warnings[]?),
              (.details.webhookHealth.error?),
              (.details.apiHealth.error?),
              (.details.lineBotHealth.error?)
            ]
            | map(select(type == "string" and length > 0))
            | join("\n")
          ')

          if [ "$LINE_PASSED" != "true" ]; then
            if echo "$LINE_SIGNALS" | grep -Eq "LINE Webhook|HTTP 401|Unauthorized|401"; then
              LINE_ISSUES="webhook_401"
            elif echo "$LINE_SIGNALS" | grep -Eqi "タイムアウト|timeout"; then
              LINE_ISSUES="webhook_timeout"
            elif echo "$LINE_SIGNALS" | grep -Eqi "トークン無効|期限切れ"; then
              LINE_ISSUES="token_expired"
            elif echo "$LINE_SIGNALS" | grep -Eqi "LINE登録API.*失敗|API.*down"; then
              LINE_ISSUES="api_down"
            fi
          fi

          if [ -n "$LINE_ISSUES" ]; then
            echo "⚠️ LINE問題を検出: $LINE_ISSUES"
            echo "LINE_ISSUES=$LINE_ISSUES" >> $GITHUB_ENV

            echo "🔧 GitHub Actions自動修繕を開始..."
            gh workflow run auto-repair-line.yml \
              -f issue_type="$LINE_ISSUES" \
              -f dry_run="false"

            echo "REPAIR_TRIGGERED=true" >> $GITHUB_ENV
          else
            echo "✅ LINE問題なし"
          fi

      - name: Execute GitHub-authenticated fallback repairs
        if: always() && steps.mode.outputs.mode == 'daily'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔁 GitHub認証付きフォールバック修繕を確認..."

          if [ -z "$AUDIT_BODY" ]; then
            echo "ℹ️ 監査結果が空のためスキップ"
            exit 0
          fi

          REM_TRIGGERED=$(echo "$AUDIT_BODY" | jq -r '.remediation.triggered // false')
          SUCCESS_COUNT=$(echo "$AUDIT_BODY" | jq -r '.remediation.summary.successCount // 0')
          SKIPPED_COUNT=$(echo "$AUDIT_BODY" | jq -r '.remediation.summary.skippedCount // 0')
          REMEDIATION_ERROR=$(echo "$AUDIT_BODY" | jq -r '.remediation.error // ""')

          if [ "$REM_TRIGGERED" != "true" ] || [ "$SKIPPED_COUNT" -eq 0 ] || [ "$SUCCESS_COUNT" -ne 0 ]; then
            echo "ℹ️ GitHubフォールバック不要"
            exit 0
          fi

          if ! echo "$REMEDIATION_ERROR" | grep -Eqi 'GitHub API (401|403|404|422)|MANUS_GITHUB_TOKEN|GITHUB_TOKEN|not configured|manual intervention required'; then
            echo "ℹ️ GitHub認証起因のスキップではないためフォールバックしない"
            exit 0
          fi

          mapfile -t CARD_REPAIRS < <(
            echo "$AUDIT_BODY" | jq -r '
              .remediation.actions[]? |
              select(.action == "generate_cards") |
              [
                (
                  if (.params.themes | type?) == "array" then
                    (.params.themes | map(select(type == "string" and length > 0)) | join(","))
                  elif (.params.themes | type?) == "string" then
                    .params.themes
                  elif (.params.theme | type?) == "string" then
                    .params.theme
                  else
                    ""
                  end
                ),
                ((.params.count // 50) | tostring)
              ] |
              @tsv
            '
          )

          if [ ${#CARD_REPAIRS[@]} -gt 0 ]; then
            THEMES=$(printf '%s\n' "${CARD_REPAIRS[@]}" | cut -f1 | awk 'NF' | sort -u | paste -sd, -)
            COUNT=$(printf '%s\n' "${CARD_REPAIRS[@]}" | cut -f2 | awk 'NF' | sort -nr | head -n1)

            if [ -n "$THEMES" ]; then
              echo "🚀 replenish-cards.yml をフォールバック起動: themes=${THEMES}, count=${COUNT:-50}"
              gh workflow run replenish-cards.yml \
                -f themes="$THEMES" \
                -f count="${COUNT:-50}"
            fi
          fi

          mapfile -t REDEPLOY_REPAIRS < <(
            echo "$AUDIT_BODY" | jq -r '
              .remediation.actions[]? |
              select(.action == "redeploy_function") |
              [.target, ((.params.noVerifyJwt // false) | tostring)] |
              @tsv
            '
          )

          for entry in "${REDEPLOY_REPAIRS[@]}"; do
            [ -z "$entry" ] && continue
            FUNCTION_NAME=$(printf '%s' "$entry" | cut -f1)
            NO_VERIFY_JWT=$(printf '%s' "$entry" | cut -f2)

            if [ -z "$FUNCTION_NAME" ]; then
              continue
            fi

            echo "🚀 deploy-supabase.yml をフォールバック起動: function=${FUNCTION_NAME}, no_verify_jwt=${NO_VERIFY_JWT}"
            gh workflow run deploy-supabase.yml \
              -f function_name="$FUNCTION_NAME" \
              -f no_verify_jwt="${NO_VERIFY_JWT:-false}"
          done

          if echo "$AUDIT_BODY" | jq -e '.remediation.actions[]? | select(.action == "reset_secret")' >/dev/null; then
            echo "ℹ️ reset_secret は human-gated のため自動実行しません"
          fi

      - name: Auto-fix audit failures with Manus fallback
        if: env.AUDIT_FAILED == 'true'
        id: auto_fix
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          MANUS_BASE_URL: ${{ vars.MANUS_BASE_URL }}
        run: |
          bash scripts/auto-fix/auto-fix-or-manus.sh "$AUDIT_BODY_PATH" "$AUDIT_MODE" "$AUDIT_HTTP_CODE"

      - name: Commit auto-fix artifacts
        if: env.AUDIT_FAILED == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "Manus Automation"
          git config user.email "automation@manus.im"
          git add -A
          git commit -m "chore: auto-fix audit ${AUDIT_MODE} $(date -u +%Y%m%d%H%M%S)" || exit 0
          git push

      - name: Notify on failure
        # Avoid duplicate alerts: the Supabase function posts the full audit report
        # to Discord when the audit ran successfully (HTTP 200). This step is only
        # for "audit execution failed" situations (non-200 or missing response).
        if: env.AUDIT_FAILED == 'true' && env.AUDIT_HTTP_CODE != '200'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ADMIN_WEBHOOK_URL }}
          AUTO_FIX_APPLIED: ${{ steps.auto_fix.outputs.auto_fix_applied }}
          MANUS_TASK_URL: ${{ steps.auto_fix.outputs.manus_task_url }}
        run: |
          AUTO_FIX_STATUS="auto-fix not applied"
          if [ "$AUTO_FIX_APPLIED" = "true" ]; then
            AUTO_FIX_STATUS="auto-fix applied"
          elif [ -n "$MANUS_TASK_URL" ]; then
            AUTO_FIX_STATUS="manus task created"
          fi
          MODE_NAME="日次"
          if [ "${{ steps.mode.outputs.mode }}" = "weekly" ]; then
            MODE_NAME="週次"
          elif [ "${{ steps.mode.outputs.mode }}" = "monthly" ]; then
            MODE_NAME="月次"
          fi

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content": "🚨 **Manus'"$MODE_NAME"'監査が失敗しました**\n対応: '"$AUTO_FIX_STATUS"'\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          fi

      - name: Finalize audit status
        if: always()
        run: |
          if [ "${AUDIT_FAILED:-false}" != "true" ]; then
            exit 0
          fi
          if [ "${AUDIT_HTTP_CODE:-0}" = "200" ]; then
            echo "Audit completed with findings; keeping workflow green because execution succeeded."
            exit 0
          fi
          if [ "${{ steps.auto_fix.outputs.auto_fix_applied }}" = "true" ]; then
            exit 0
          fi
          exit 1
