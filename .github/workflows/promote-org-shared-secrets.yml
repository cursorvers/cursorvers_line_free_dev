name: Promote Org Shared Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ORG_SECRET_MANAGER_PAT }}
      ORG_NAME: cursorvers
      TARGET_REPOS: cursorvers/cursorvers_line_free_dev
      DISCORD_ADMIN_WEBHOOK_URL: ${{ secrets.DISCORD_ADMIN_WEBHOOK_URL }}
      MANUS_AUDIT_API_KEY: ${{ secrets.MANUS_AUDIT_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      PROGRESS_WEBHOOK_URL: ${{ secrets.PROGRESS_WEBHOOK_URL }}
    steps:
      - name: Validate promotion token
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?ORG_SECRET_MANAGER_PAT is required}"

      - name: Promote shared secrets to org
        shell: bash
        run: |
          set -euo pipefail

          promote_secret() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "${value}" ]]; then
              echo "SKIP ${name}: value not set in source repo"
              return 0
            fi

            printf '%s' "${value}" | gh secret set "${name}" \
              --org "${ORG_NAME}" \
              --visibility selected \
              --repos "${TARGET_REPOS}" >/dev/null

            echo "OK ${name}"
          }

          promote_secret DISCORD_ADMIN_WEBHOOK_URL
          promote_secret MANUS_AUDIT_API_KEY
          promote_secret GOOGLE_SERVICE_ACCOUNT_JSON
          promote_secret PROGRESS_WEBHOOK_URL

      - name: Verify org visibility
        shell: bash
        run: |
          set -euo pipefail
          gh secret list --org "${ORG_NAME}" | grep -E '^(DISCORD_ADMIN_WEBHOOK_URL|MANUS_AUDIT_API_KEY|GOOGLE_SERVICE_ACCOUNT_JSON|PROGRESS_WEBHOOK_URL)[[:space:]]'
