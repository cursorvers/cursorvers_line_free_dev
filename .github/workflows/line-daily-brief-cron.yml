# .github/workflows/line-daily-brief-cron.yml
# 隔週金曜 LINE Daily Brief を配信するワークフロー（source_type=auto, Edge Function側で自動判定）

name: LINE Daily Brief

on:
  schedule:
    # 金曜 JST 12:00 (UTC 03:00) — 毎週発火、ジョブ内で偶数ISOweekのみ実行
    - cron: '0 3 * * 5'
  workflow_dispatch:
    inputs:
      source_type:
        description: 'Card source type (belief or note). Leave empty for auto.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - belief
          - note

concurrency:
  group: line-daily-brief
  cancel-in-progress: true

jobs:
  send-daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup log directory
        run: |
          mkdir -p workflow-logs
          echo "LOG_FILE=workflow-logs/line-daily-brief-$(date -u +%Y%m%d_%H%M%S).log" >> $GITHUB_ENV

      - name: Determine source type and biweekly gate
        id: source
        run: |
          # Manual input takes priority (skip biweekly gate)
          MANUAL_SOURCE="${{ github.event.inputs.source_type }}"
          if [ -n "$MANUAL_SOURCE" ]; then
            echo "type=$MANUAL_SOURCE" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "📋 Manual source_type: $MANUAL_SOURCE"
            exit 0
          fi

          # Biweekly gate: run on even ISO weeks only (Friday JST 12:00 = UTC 03:00)
          DOW=$(date -u +%u)  # 1=Mon ... 7=Sun (Friday=5)
          ISO_WEEK=$(date -u +%V | sed 's/^0*//')  # strip leading zero
          if [ "$DOW" = "5" ] && [ $(( ISO_WEEK % 2 )) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "📋 Biweekly Friday: ISO week $ISO_WEEK (even) → run"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "📋 Biweekly Friday: ISO week $ISO_WEEK (odd) → skip"
          fi

          # source_type = auto (Edge Function decides)
          echo "type=" >> "$GITHUB_OUTPUT"
          echo "📋 source_type: auto"

      - name: Trigger line-daily-brief Edge Function
        if: steps.source.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOURCE_TYPE: ${{ steps.source.outputs.type }}
        run: |
          exec > >(tee -a "$LOG_FILE") 2>&1
          echo "📤 LINE Daily Brief を配信中... (source_type: ${SOURCE_TYPE:-auto})"

          # Build request body
          if [ -n "$SOURCE_TYPE" ]; then
            BODY="{\"source_type\": \"${SOURCE_TYPE}\"}"
          else
            BODY="{}"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/line-daily-brief" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          RESP_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $RESP_BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            if echo "$RESP_BODY" | grep -Eiq 'LINE API error 429|monthly limit'; then
              echo "⚠️ LINE月間送信上限に到達しているため、今回の配信はスキップ扱いにします"
              exit 0
            fi
            echo "❌ Edge Function returned $HTTP_CODE"
            exit 1
          fi

          # no_card / quota_exceeded の場合もエラーにしない
          STATUS=$(echo "$RESP_BODY" | jq -r '.status // empty' 2>/dev/null || true)
          CARD_SENT=$(echo "$RESP_BODY" | jq -r '.cardSent // empty' 2>/dev/null || true)
          if [ "$STATUS" = "no_card" ]; then
            echo "📭 配信可能なカードがありませんでした（正常終了）"
          elif [ "$STATUS" = "quota_exceeded" ]; then
            echo "⚠️ LINE月間送信上限に到達しているため、今回の配信はスキップ扱いにします"
          elif [ "$STATUS" = "success" ]; then
            echo "✅ LINE Daily Brief 配信成功"
          elif [ "$CARD_SENT" = "true" ]; then
            echo "✅ LINE Daily Brief 配信成功"
          else
            echo "⚠️ 予期しないステータス: $STATUS"
          fi

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_SYSTEM_WEBHOOK || secrets.DISCORD_ADMIN_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content": "⚠️ **LINE Daily Brief ワークフローが失敗しました**\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          fi

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: line-daily-brief-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: workflow-logs/
          retention-days: 90
