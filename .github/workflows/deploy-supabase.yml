name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:
    inputs:
      function_name:
        description: "Optional single function to deploy"
        required: false
        default: ""
      no_verify_jwt:
        description: "Use --no-verify-jwt for the selected function"
        required: false
        default: "false"

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  DISCORD_SYSTEM_WEBHOOK: ${{ secrets.DISCORD_SYSTEM_WEBHOOK }}

jobs:
  line-bot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.5.6"

      - name: Cache Deno dependencies
        run: |
          cd supabase/functions
          for f in line-bot line-webhook stripe-webhook discord-bot create-checkout-session line-register stats-exporter health-check stripe-consistency-check line-daily-brief verification-reminder; do
            deno cache --config deno.json "$f/index.ts" 2>/dev/null || true
          done

      - name: Smoke test signed POST
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_WEBHOOK_SECRET: smoke-test-secret
          STRIPE_WEBHOOK_SMOKE_MODE: "true"
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_CHECKOUT_SMOKE_MODE: "true"
          STRIPE_PRICE_ID_LIBRARY: price_smoke
          STRIPE_SUCCESS_URL_LIBRARY: https://example.com/success
          STRIPE_CANCEL_URL_LIBRARY: https://example.com/cancel
          LINE_REGISTER_SMOKE_MODE: "true"
          STATS_EXPORTER_SMOKE_MODE: "true"
          HEALTH_CHECK_SMOKE_MODE: "true"
          STRIPE_CONSISTENCY_SMOKE_MODE: "true"
          LINE_DAILY_BRIEF_SMOKE_MODE: "true"
          LINE_DAILY_BRIEF_API_KEY: smoke-line-brief
          VERIFICATION_REMINDER_SMOKE_MODE: "true"
          CRON_SECRET: smoke-cron-secret
          DISCORD_WEBHOOK_URL: https://example.com
          DISCORD_SYSTEM_WEBHOOK: https://example.com
        run: |
          set -euo pipefail
          : "${LINE_CHANNEL_ACCESS_TOKEN:?LINE_CHANNEL_ACCESS_TOKEN missing}"
          : "${LINE_CHANNEL_SECRET:?LINE_CHANNEL_SECRET missing}"
          : "${SUPABASE_URL:?SUPABASE_URL missing}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY missing}"

          line_body='{"events":[]}'
          line_signature=$(printf "%s" "$line_body" | openssl dgst -sha256 -hmac "$LINE_CHANNEL_SECRET" -binary | openssl base64 -A)

          run_line_smoke() {
            local name="$1"
            local file="$2"
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"

            deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              status=$(curl -s -o "$body_file" -w "%{http_code}" \
                -H "x-line-signature: $line_signature" \
                -H "content-type: application/json" \
                -d "$line_body" \
                http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi

            local response_body
            response_body=$(cat "$body_file" || true)
            if [ "$response_body" != "OK" ]; then
              echo "${name}: Unexpected body: $response_body"
              exit 1
            fi
          }

          run_stripe_smoke() {
            local name="$1"
            local file="$2"
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"
            local timestamp
            local payload
            local signature
            local stripe_header

            timestamp=$(date +%s)
            payload="${timestamp}.${stripe_body}"
            signature=$(printf "%s" "$payload" | openssl dgst -sha256 -hmac "$STRIPE_WEBHOOK_SECRET" -hex | sed 's/^.* //')
            stripe_header="t=${timestamp},v1=${signature}"

            deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              status=$(curl -s -o "$body_file" -w "%{http_code}" \
                -H "Stripe-Signature: $stripe_header" \
                -H "x-smoke-test: true" \
                -H "content-type: application/json" \
                -d "$stripe_body" \
                http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi
          }

          run_discord_smoke() {
            local name="$1"
            local file="$2"
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"
            local discord_body
            local timestamp

            discord_body='{"type":1}'
            timestamp=$(date +%s)

            eval "$(
              DISCORD_BODY="$discord_body" DISCORD_TIMESTAMP="$timestamp" \
                deno eval --quiet -c supabase/functions/deno.json '
              import nacl from "tweetnacl";
              const body = Deno.env.get("DISCORD_BODY") ?? "";
              const timestamp = Deno.env.get("DISCORD_TIMESTAMP") ?? "";
              const keyPair = nacl.sign.keyPair();
              const encoder = new TextEncoder();
              const signature = nacl.sign.detached(
                encoder.encode(timestamp + body),
                keyPair.secretKey,
              );
              const toHex = (bytes) =>
                Array.from(bytes).map((b) => b.toString(16).padStart(2, "0")).join("");
              console.log(`SMOKE_DISCORD_PUBLIC_KEY=${toHex(keyPair.publicKey)}`);
              console.log(`SMOKE_DISCORD_SIGNATURE=${toHex(signature)}`);
              ')"

            if [ -z "${SMOKE_DISCORD_PUBLIC_KEY:-}" ] || [ -z "${SMOKE_DISCORD_SIGNATURE:-}" ]; then
              echo "${name}: Failed to generate Discord signature"
              exit 1
            fi

            DISCORD_PUBLIC_KEY="$SMOKE_DISCORD_PUBLIC_KEY" \
              DISCORD_BOT_TOKEN="smoke-token" \
              DISCORD_ROLE_ID="smoke-role" \
              SEC_BRIEF_CHANNEL_ID="smoke-channel" \
              SUPABASE_URL="$SUPABASE_URL" \
              SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              status=$(curl -s -o "$body_file" -w "%{http_code}" \
                -H "X-Signature-Ed25519: $SMOKE_DISCORD_SIGNATURE" \
                -H "X-Signature-Timestamp: $timestamp" \
                -H "content-type: application/json" \
                -d "$discord_body" \
                http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi

            local response_body
            response_body=$(cat "$body_file" || true)
            if ! echo "$response_body" | grep -q '"type":1'; then
              echo "${name}: Unexpected body: $response_body"
              exit 1
            fi
          }

          run_checkout_smoke() {
            local name="$1"
            local file="$2"
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"
            local checkout_body

            checkout_body='{"email":"smoke@example.com","opt_in_email":true,"agree_terms":true}'

            STRIPE_CHECKOUT_SMOKE_MODE="true" \
              STRIPE_API_KEY="sk_test_smoke" \
              STRIPE_PRICE_ID_LIBRARY="price_smoke" \
              STRIPE_SUCCESS_URL_LIBRARY="https://example.com/success" \
              STRIPE_CANCEL_URL_LIBRARY="https://example.com/cancel" \
              deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              status=$(curl -s -o "$body_file" -w "%{http_code}" \
                -H "x-smoke-test: true" \
                -H "content-type: application/json" \
                -d "$checkout_body" \
                http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi

            local response_body
            response_body=$(cat "$body_file" || true)
            if ! echo "$response_body" | grep -q "checkout-smoke"; then
              echo "${name}: Unexpected body: $response_body"
              exit 1
            fi
          }

          run_line_register_smoke() {
            local name="$1"
            local file="$2"
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"
            local register_body

            register_body='{"email":"smoke@example.com"}'

            LINE_REGISTER_SMOKE_MODE="true" \
              deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              status=$(curl -s -o "$body_file" -w "%{http_code}" \
                -H "x-smoke-test: true" \
                -H "content-type: application/json" \
                -d "$register_body" \
                http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi

            local response_body
            response_body=$(cat "$body_file" || true)
            if ! echo "$response_body" | grep -q '"smoke":true'; then
              echo "${name}: Unexpected body: $response_body"
              exit 1
            fi
          }

          run_json_smoke() {
            local name="$1"
            local file="$2"
            local method="$3"
            local body="$4"
            shift 4
            local log_file="/tmp/${name}.log"
            local body_file="/tmp/${name}-body.txt"

            deno run --allow-env --allow-net "$file" >"$log_file" 2>&1 &
            local pid=$!

            local status=000
            for i in 1 2 3 4 5; do
              sleep 1
              local curl_args=(
                -s
                -o "$body_file"
                -w "%{http_code}"
                -X "$method"
              )
              for header in "$@"; do
                curl_args+=( -H "$header" )
              done
              if [ -n "$body" ]; then
                curl_args+=( -d "$body" )
              fi
              status=$(curl "${curl_args[@]}" http://localhost:8000/ || true)
              if [ "$status" != "000" ]; then
                break
              fi
            done

            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true

            if [ "$status" != "200" ]; then
              echo "${name}: Unexpected status: $status"
              echo "Response:"
              cat "$body_file" || true
              echo "Log:"
              tail -n 50 "$log_file" || true
              exit 1
            fi

            local response_body
            response_body=$(cat "$body_file" || true)
            if ! echo "$response_body" | grep -q '"smoke":true'; then
              echo "${name}: Unexpected body: $response_body"
              exit 1
            fi
          }

          stripe_body='{"id":"evt_smoke","object":"event","type":"test.event","data":{"object":{}}}'

          run_line_smoke "line-bot" "supabase/functions/line-bot/index.ts"
          run_line_smoke "line-webhook" "supabase/functions/line-webhook/index.ts"
          run_stripe_smoke "stripe-webhook" "supabase/functions/stripe-webhook/index.ts"
          run_discord_smoke "discord-bot" "supabase/functions/discord-bot/index.ts"
          run_checkout_smoke "create-checkout-session" "supabase/functions/create-checkout-session/index.ts"
          run_line_register_smoke "line-register" "supabase/functions/line-register/index.ts"
          run_json_smoke "stats-exporter" "supabase/functions/stats-exporter/index.ts" "GET" "" \
            "x-smoke-test: true"
          run_json_smoke "health-check" "supabase/functions/health-check/index.ts" "GET" "" \
            "x-smoke-test: true"
          run_json_smoke "stripe-consistency-check" "supabase/functions/stripe-consistency-check/index.ts" "GET" "" \
            "x-smoke-test: true"
          run_json_smoke "line-daily-brief" "supabase/functions/line-daily-brief/index.ts" "POST" "{}" \
            "x-smoke-test: true" \
            "content-type: application/json" \
            "X-API-Key: $LINE_DAILY_BRIEF_API_KEY"
          run_json_smoke "verification-reminder" "supabase/functions/verification-reminder/index.ts" "POST" "{}" \
            "x-smoke-test: true" \
            "content-type: application/json" \
            "Authorization: Bearer $CRON_SECRET"

  deploy:
    needs: [line-bot-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup log directory and tracking
        run: |
          mkdir -p deploy-logs
          echo "DEPLOY_LOG=deploy-logs/deploy-$(date -u +%Y%m%d_%H%M%S).log" >> $GITHUB_ENV
          # デプロイ結果追跡用
          echo "DEPLOY_SUCCESS=0" >> $GITHUB_ENV
          echo "DEPLOY_FAILED=0" >> $GITHUB_ENV
          echo "FAILED_FUNCTIONS=" >> $GITHUB_ENV

      - name: Sync Manus automation secrets to Supabase
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' || inputs.function_name == 'manus-intelligent-repair' }}
        env:
          MANUS_GITHUB_TOKEN: ${{ secrets.MANUS_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SECRET_ARGS=()
          if [ -n "${MANUS_GITHUB_TOKEN:-}" ]; then
            SECRET_ARGS+=("MANUS_GITHUB_TOKEN=${MANUS_GITHUB_TOKEN}")
          fi
          if [ -n "${GITHUB_REPO:-}" ]; then
            SECRET_ARGS+=("GITHUB_REPO=${GITHUB_REPO}")
          fi

          if [ ${#SECRET_ARGS[@]} -eq 0 ]; then
            echo "No Manus automation secrets to sync"
            exit 0
          fi

          echo "Syncing ${#SECRET_ARGS[@]} Manus automation secret(s) to Supabase"
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" "${SECRET_ARGS[@]}"

      - name: Deploy selected function
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.function_name != '' }}
        id: deploy_selected_function
        env:
          SELECTED_FUNCTION: ${{ inputs.function_name }}
          SELECTED_NO_VERIFY_JWT: ${{ inputs.no_verify_jwt }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ "$SELECTED_NO_VERIFY_JWT" = "true" ]; then
            EXTRA_ARGS+=(--no-verify-jwt)
          fi

          echo "=== Deploy ${SELECTED_FUNCTION} ${EXTRA_ARGS[*]:-} ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy "$SELECTED_FUNCTION" "${EXTRA_ARGS[@]}" --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ========================================
      # Core Functions (JWT検証あり)
      # ========================================
      - name: Deploy line-webhook
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_line_webhook
        run: |
          echo "=== Deploy line-webhook (no-verify-jwt) ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy line-webhook --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}line-webhook," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy line-daily-brief
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_line_daily_brief
        run: |
          echo "=== Deploy line-daily-brief ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy line-daily-brief --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}line-daily-brief," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy stats-exporter
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_stats_exporter
        run: |
          echo "=== Deploy stats-exporter ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy stats-exporter --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}stats-exporter," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy health-check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_health_check
        run: |
          echo "=== Deploy health-check ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy health-check --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}health-check," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy stripe-consistency-check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_stripe_consistency_check
        run: |
          echo "=== Deploy stripe-consistency-check ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy stripe-consistency-check --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}stripe-consistency-check," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy manus-audit-line-daily-brief
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_manus_audit
        run: |
          echo "=== Deploy manus-audit-line-daily-brief ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy manus-audit-line-daily-brief --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}manus-audit-line-daily-brief," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy relay
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_relay
        run: |
          echo "=== Deploy relay ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy relay --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}relay," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      # ========================================
      # Webhook Functions (JWT検証なし)
      # 理由: 外部サービスからのリクエストを受け付けるため
      # セキュリティ: 各関数内で独自の認証・署名検証を実装
      #   - stripe-webhook: Stripe署名検証 (constructEventAsync)
      #   - line-register: LIFF経由のリクエスト
      #   - line-bot: LINE署名検証
      #   - discord-bot: Discord署名検証
      #   - create-checkout-session: フロントエンドからのリクエスト
      #   - ingest-hij: API Key認証
      #   - generate-sec-brief: API Key認証
      # ========================================
      - name: Deploy stripe-webhook
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_stripe_webhook
        run: |
          echo "=== Deploy stripe-webhook (no-verify-jwt) ===" | tee -a "$DEPLOY_LOG"
          if supabase functions deploy stripe-webhook --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee -a "$DEPLOY_LOG"; then
            echo "DEPLOY_SUCCESS=$((DEPLOY_SUCCESS + 1))" >> $GITHUB_ENV
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_FAILED=$((DEPLOY_FAILED + 1))" >> $GITHUB_ENV
            echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS}stripe-webhook," >> $GITHUB_ENV
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Deploy create-checkout-session
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function_name == '' }}
        id: deploy_checkout
        run: |
          echo "=== Deploy create-checkout-session (no-verify-jwt) ===" | tee -a "$DEPLOY_LOG"
